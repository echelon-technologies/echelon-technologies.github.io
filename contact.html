    <style>
        body { background-color: #f4f6f9; }
        .contact-card {
            background: #fff;

            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: -80px;
            position: relative;
            z-index: 2;
        }
        .header-hero {

            background-position: bottom center;
            background-repeat: no-repeat;

        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
            border: 1px solid #fff;
            display: inline-block;
        }
        .back-btn:hover { background: #fff; color: #3842ec; text-decoration: none; }
        .contact-info-item {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }
        .icon-box {
            width: 50px;
            height: 50px;
            background: #3842ec;
            color: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 20px;
        }
        .info-text h5 { margin-bottom: 0; font-size: 18px; color: #333; }
        .info-text p { margin-bottom: 0; color: #666; }
